version: "3.8"

services:
  # PostgreSQL - 使用较轻量的 alpine 版本用于测试
  postgres-test:
    image: postgres:15-alpine
    container_name: interview-postgres-test
    environment:
      POSTGRES_DB: interview_prep_test
      POSTGRES_USER: interview
      POSTGRES_PASSWORD: interview123
    ports:
      - "5433:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
      # 容器首次启动时自动执行，创建表结构和测试数据
      # 注意：只在数据卷为空（首次启动）时执行
      - ./init-sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # Redis - 测试环境
  redis-test:
    image: redis:7-alpine
    container_name: interview-redis-test
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  # Kafka - 使用 KRaft 模式（无需 ZooKeeper）
  kafka-test:
    image: confluentinc/cp-kafka:7.5.0
    container_name: interview-kafka-test
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 10485760
    ports:
      - "9093:9092"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M

volumes:
  postgres-test-data:
    driver: local
